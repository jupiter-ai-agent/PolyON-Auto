apiVersion: polyon.io/v1
kind: Module

metadata:
  id: auto
  name: PolyON Auto
  version: "0.1.0"
  category: integration
  description: "워크플로우 자동화 엔진 (n8n) — PolyON AD/Keycloak 기반 SSO + PRC 기반 리소스 사용"
  icon: Automation
  vendor: "Triangle.s"
  license: Sustainable Use License

spec:
  engine: auto

  # PRC Claims (DB, S3, SMTP, Auth)
  claims:
    - type: database
      config:
        name: auto
    - type: objectStorage
      config:
        bucket: auto
    - type: smtp
      config:
        domain: auto
    - type: auth
      config:
        clientId: auto

  # n8n 컨테이너 리소스
  resources:
    image: docker.n8n.io/n8nio/n8n:latest
    replicas: 1
    ports:
      - name: http
        containerPort: 5678
    health:
      path: /healthz/readiness
      port: 5678
      initialDelay: 30
      period: 10
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi

  # PolyON PRC → n8n ENV 매핑
  env:
    # Database (PostgreSQL)
    DB_TYPE: "postgresdb"
    DB_POSTGRESDB_HOST: "{{ claims.database.host }}"
    DB_POSTGRESDB_PORT: "{{ claims.database.port }}"
    DB_POSTGRESDB_DATABASE: "{{ claims.database.database }}"
    DB_POSTGRESDB_USER: "{{ claims.database.user }}"
    DB_POSTGRESDB_PASSWORD: "{{ claims.database.password }}"

    # Binary / Execution Storage → RustFS (S3) — n8n 공식 env 이름 사용
    N8N_DEFAULT_BINARY_DATA_MODE: "s3"
    N8N_EXECUTION_DATA_STORAGE_MODE: "database"
    N8N_EXTERNAL_STORAGE_S3_HOST: "{{ claims.objectStorage.host }}"
    N8N_EXTERNAL_STORAGE_S3_PROTOCOL: "http"
    N8N_EXTERNAL_STORAGE_S3_BUCKET_NAME: "{{ claims.objectStorage.bucket }}"
    N8N_EXTERNAL_STORAGE_S3_BUCKET_REGION: "default"
    N8N_EXTERNAL_STORAGE_S3_ACCESS_KEY: "{{ claims.objectStorage.accessKey }}"
    N8N_EXTERNAL_STORAGE_S3_ACCESS_SECRET: "{{ claims.objectStorage.secretKey }}"

    # SMTP (초대/알림 메일)
    N8N_SMTP_HOST: "{{ claims.smtp.host }}"
    N8N_SMTP_PORT: "{{ claims.smtp.port }}"
    N8N_SMTP_USER: "{{ claims.smtp.user }}"
    N8N_SMTP_PASSWORD: "{{ claims.smtp.password }}"
    N8N_SMTP_SENDER: "auto@{{ baseDomain }}"

    # OIDC SSO (Keycloak, AD 기반)
    N8N_SSO_JUST_IN_TIME_PROVISIONING: "true"
    N8N_SSO_REDIRECT_LOGIN_TO_SSO: "true"
    N8N_SSO_OIDC_LOGIN_ENABLED: "true"
    N8N_SSO_SAML_LOGIN_ENABLED: "false"
    N8N_SSO_LDAP_LOGIN_ENABLED: "false"

    # PolyON-auth(=Keycloak) — 초기 OIDC 설정은 DB 저장이므로, entrypoint/init에서 이 env로 DB에 주입 필요
    N8N_OIDC_DISCOVERY_URL: "{{ claims.auth.discoveryEndpoint }}"
    N8N_OIDC_CLIENT_ID: "{{ claims.auth.clientId }}"
    N8N_OIDC_CLIENT_SECRET: "{{ claims.auth.clientSecret }}"

  # Ingress
  ingress:
    subdomain: auto
    port: 5678
